name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install test tools
        run: python -m pip install --upgrade pip pytest ruff
      - name: Lint
        run: ruff check .
      - name: Compile scripts
        run: python -m compileall -q skills tests
      - name: Tests
        run: pytest -q
      - name: Package skills
        run: ./package-skills.sh
