name: Agent Security SARIF Scan

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  security-events: write

jobs:
  agent-security-sarif:
    name: Agent config scan with SARIF upload
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate agent-security SARIF
        run: |
          python3 skills/agent-security/scripts/config_risk_summary.py \
            --format sarif \
            --fail-on high \
            < examples/high-risk-agent-config.json \
            > agent-security.sarif

      - name: Upload SARIF to code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: agent-security.sarif
